<!-- Version: v1.0.6 -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顏色轉盤抽籤器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-color: #FDFBF7;
            color: #4A4036;
            box-sizing: border-box;
        }
        .container {
            background-color: #E8E4D9;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }
        h1 { color: #4A4036; margin-bottom: 20px; font-size: 1.6em; }
        .mode-selection { margin-bottom: 20px; }
        .mode-selection input[type="radio"] { margin-right: 5px; }
        .mode-selection label { margin-right: 15px; font-weight: bold; cursor: pointer; }
        label { display: block; margin-bottom: 8px; font-weight: bold; text-align: left; }
        
        input[type="number"], textarea {
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #C4B5A5; border-radius: 8px; font-size: 16px; box-sizing: border-box;
        }

        /* Main Action Buttons */
        .btn-primary {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            background-color: #C4B5A5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 5px;
            transition: background-color 0.3s, transform 0.1s;
        }
        .btn-primary:hover { background-color: #A59685; transform: translateY(-2px); }
        .btn-primary:disabled { background-color: #D3D3D3; cursor: not-allowed; transform: none; }

        button {
            background-color: #C4B5A5; color: white; padding: 10px 20px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 5px;
        }

        .seed-controls { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        .seed-input-group { display: flex; gap: 5px; width: 100%; }
        .seed-input-group input { flex-grow: 1; padding: 10px; border: 1px solid #C4B5A5; border-radius: 8px; font-size: 14px; }

        #wheelCanvas {
            background-color: #FDFBF7; border: 5px solid #C4B5A5; border-radius: 50%; margin: 20px auto; display: block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 280px; height: 280px;
        }
        #result { margin-top: 20px; padding: 15px; background-color: #FDFBF7; border-radius: 10px; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #pickedItem { font-size: 1.2em; font-weight: bold; }
        #pickedColorCode { font-family: monospace; background: #E8E4D9; padding: 2px 6px; border-radius: 4px; }
        #pickedColorBlock { width: 50px; height: 50px; border-radius: 50%; margin-top: 10px; border: 1px solid #4A4036; }

        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 1.4em; }
            #wheelCanvas { width: 250px; height: 250px; }
            .btn-primary { font-size: 18px; padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>顏色轉盤抽籤器</h1>

        <div class="mode-selection">
            <input type="radio" id="modeColors" name="mode" value="colors" checked onchange="switchMode()">
            <label for="modeColors">指定顏色數量</label>
            <input type="radio" id="modeCustom" name="mode" value="custom" onchange="switchMode()">
            <label for="modeCustom">自由設定內容</label>
        </div>

        <div id="colors-mode-controls">
            <label for="colorCount">顏色數量 (2-20):</label>
            <input type="number" id="colorCount" value="5" min="2" max="20">
            <button class="btn-primary" onclick="generateAndSetNewSeed()">產生全新顏色 (新 Seed)</button>
        </div>

        <div id="custom-mode-controls" style="display:none;">
            <label for="customItems">輸入項目 (每行一個):</label>
            <textarea id="customItems" rows="5" placeholder="吃火鍋&#10;吃壽司&#10;吃牛排"></textarea>
            <button class="btn-primary" onclick="setCustomItemsAndDraw()">設定項目</button>
        </div>

        <div class="seed-controls">
            <label>Seed 管理</label>
            <div class="seed-input-group">
                <input type="text" id="seedInput" placeholder="輸入特定 Seed">
                <button onclick="setSeedAndRegenerate()">套用</button>
            </div>
            <button onclick="generateAndSetNewSeed()" style="width: 100%;">產生隨機 Seed</button>
        </div>

        <canvas id="wheelCanvas" width="400" height="400"></canvas>

        <button id="spinButton" class="btn-primary" style="background-color: #4A4036;" onclick="spinWheel()">開始抽籤</button>
        <button id="resetButton" style="width: 100%; margin-top: 5px;" onclick="resetTool()">重設</button>

        <div id="result">
            <p>抽中項目: <span id="pickedItem"></span></p>
            <p>顏色HEX: <span id="pickedColorCode"></span></p>
            <div id="pickedColorBlock"></div>
        </div>

        <div style="margin-top: 20px; font-size: 0.7em; color: #8A7B6D;">版本: v1.0.6</div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const colorCountInput = document.getElementById('colorCount');
        const customItemsTextarea = document.getElementById('customItems');
        const spinButton = document.getElementById('spinButton');
        const resetButton = document.getElementById('resetButton');
        const pickedItemSpan = document.getElementById('pickedItem');
        const pickedColorCodeSpan = document.getElementById('pickedColorCode');
        const pickedColorBlockDiv = document.getElementById('pickedColorBlock');

        let wheelItems = [];
        let currentRotation = 0;
        let isSpinning = false;
        let animationId = null;
        let currentSeed = null;
        const SEED_STORAGE_KEY = 'lotter…d_v1';
        const SIMILARITY_HUE_THRESHOLD = 25;

        function seededRandom(seed) {
            let state = Number(seed) || 0;
            return function() {
                state = (1664525 * state + 1013904223) % 4294967296;
                return state / 4294967296;
            };
        }

        function generateTrulyRandomSeed() {
            return Math.floor(Math.random() * 1000000000) + Date.now();
        }

        function getSeedFromInput() {
            const val = document.getElementById('seedInput').value.trim();
            if (!val) return null;
            const parsed = parseFloat(val);
            return isNaN(parsed) ? val : parsed;
        }

        function updateSeedInputAndState(seed) {
            currentSeed = seed;
            document.getElementById('seedInput').value = seed === null ? '' : seed;
            localStorage.setItem(SEED_STORAGE_KEY, seed === null ? '' : seed);
        }

        function generateAndSetNewSeed() {
            const newSeed = generateTrulyRandomSeed();
            updateSeedInputAndState(newSeed);
            regenerateColors();
        }

        function setSeedAndRegenerate() {
            updateSeedInputAndState(getSeedFromInput());
            regenerateColors();
        }

        function regenerateColors() {
            if (isSpinning) return;
            const seedToUse = currentSeed;
            if (document.getElementById('modeColors').checked) {
                generateColorsAndDraw(seedToUse);
            } else {
                setCustomItemsAndDraw(seedToUse);
            }
            clearResult();
        }

        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function hexToHsl(hex) {
            let r = parseInt(hex.substring(1, 3), 16) / 255;
            let g = parseInt(hex.substring(3, 5), 16) / 255;
            let b = parseInt(hex.substring(5, 7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return {h: h * 360, s: s * 100, l: l * 100};
        }

        function isColorSimilar(newHex, existingHexList) { 
            const newHsl = hexToHsl(newHex);
            if (newHex === '#000000' || newHex === '#FFFFFF') return false; 
            for (const existingHex of existingHexList) {
                if (existingHex === '#000000' || existingHex === '#FFFFFF') continue;
                const existingHsl = hexToHsl(existingHex);
                let hueDiff = Math.abs(newHsl.h - existingHsl.h);
                if (hueDiff > 180) hueDiff = 360 - hueDiff;
                if (hueDiff < SIMILARITY_HUE_THRESHOLD) return true;
            }
            return false;
        }

        const commonColors = ['#000000', '#FFFFFF', '#FF0000', '#008000', '#0000FF', '#FFFF00', '#808080', '#FFA500', '#800080', '#00FFFF'];

        function generateColors(count, seed) {
            const finalGeneratedColors = [];
            const commonColorsPool = [...commonColors];
            const usedColors = new Set();
            const rng = seededRandom(seed);

            for (let i = 0; i < commonColors.length; i++) {
                if (finalGeneratedColors.length >= count) break;
                const idx = Math.floor(rng() * commonColorsPool.length);
                const color = commonColorsPool[idx];
                finalGeneratedColors.push(color);
                usedColors.add(color);
                commonColorsPool.splice(idx, 1);
            }

            while (finalGeneratedColors.length < count) {
                let randomColor;
                let attempts = 0;
                do {
                    randomColor = hslToHex(rng() * 360, 70, 60);
                    attempts++;
                } while ((usedColors.has(randomColor) || isColorSimilar(randomColor, Array.from(usedColors))) && attempts < 500);
                
                if (!usedColors.has(randomColor) && !isColorSimilar(randomColor, Array.from(usedColors))) {
                     finalGeneratedColors.push(randomColor);
                     usedColors.add(randomColor);
                } else if (attempts >= 500) {
                    let fallback;
                    do { fallback = hslToHex(rng() * 360, 70, 60); } while (usedColors.has(fallback));
                    finalGeneratedColors.push(fallback);
                    usedColors.add(fallback);
                }
            }
            return finalGeneratedColors;
        }

        function getComplimentaryTextColor(hex) {
            let r = parseInt(hex.substring(1, 3), 16) / 255;
            let g = parseInt(hex.substring(3, 5), 16) / 255;
            let b = parseInt(hex.substring(5, 7), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let l = (max + min) / 2;
            return l > 0.5 ? '#4A4036' : '#FFFFFF';
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width/2, centerY = canvas.height/2, radius = 130;
            const sliceAngle = wheelItems.length > 0 ? (2 * Math.PI / wheelItems.length) : 0;
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(currentRotation);
            wheelItems.forEach((item, i) => {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.closePath();
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.strokeStyle = '#C4B5A5';
                ctx.stroke();
                if (document.getElementById('modeCustom').checked && item.text) {
                    ctx.save();
                    ctx.rotate(i * sliceAngle + sliceAngle / 2);
                    ctx.textAlign = 'right';
                    ctx.fillStyle = getComplimentaryTextColor(item.color);
                    ctx.font = 'bold 14px sans-serif';
                    ctx.fillText(item.text.substring(0, 8), radius - 10, 5);
                    ctx.restore();
                }
            });
            ctx.restore();
            // Center Circle
            ctx.beginPath(); ctx.arc(centerX, centerY, 25, 0, 2*Math.PI); ctx.fillStyle = '#E8E4D9'; ctx.fill(); ctx.stroke();
            // Pointer
            ctx.beginPath(); ctx.moveTo(centerX-10, 0); ctx.lineTo(centerX+10, 0); ctx.lineTo(centerX, 20); ctx.closePath(); ctx.fillStyle = '#4A4036'; ctx.fill();
        }

        function spinWheel() {
            if (isSpinning || wheelItems.length === 0) return;
            isSpinning = true;
            spinButton.disabled = true;
            resetButton.disabled = true;
            clearResult();
            const targetIdx = Math.floor(Math.random() * wheelItems.length);
            const sliceAngle = (2 * Math.PI / wheelItems.length);
            const totalRotation = currentRotation + (1.5 * Math.PI - (targetIdx * sliceAngle + sliceAngle/2)) + (5 * 2 * Math.PI);
            const startTime = performance.now(), duration = 2500;
            function animate(now) {
                const p = Math.min((now - startTime) / duration, 1);
                currentRotation = totalRotation * (1 - Math.pow(1 - p, 3));
                drawWheel();
                if (p < 1) animationId = requestAnimationFrame(animate);
                else {
                    isSpinning = false;
                    spinButton.disabled = false;
                    resetButton.disabled = false;
                    displayResult(targetIdx);
                }
            }
            animationId = requestAnimationFrame(animate);
        }

        function displayResult(index) {
            const item = wheelItems[index];
            pickedItemSpan.textContent = item.text;
            pickedColorCodeSpan.textContent = item.color;
            pickedColorBlockDiv.style.backgroundColor = item.color;
            pickedColorBlockDiv.style.display = 'inline-block';
        }

        function switchMode() {
            const isColors = document.getElementById('modeColors').checked;
            document.getElementById('colors-mode-controls').style.display = isColors ? 'block' : 'none';
            document.getElementById('custom-mode-controls').style.display = isColors ? 'none' : 'block';
            if (isColors && currentSeed === null) generateAndSetNewSeed();
            else regenerateColors();
        }

        function generateColorsAndDraw(seed) {
            const count = parseInt(colorCountInput.value, 10);
            const colors = generateColors(count, seed);
            wheelItems = colors.map((c, i) => ({ text: `顏色 ${i + 1}`, color: c }));
            currentRotation = 0; drawWheel(); clearResult();
        }

        function setCustomItemsAndDraw(seed) {
            const items = customItemsTextarea.value.split('\n').filter(i => i.trim() !== '');
            if (items.length === 0) return;
            const colors = generateColors(items.length, seed);
            wheelItems = items.map((t, i) => ({ text: t, color: colors[i] }));
            currentRotation = 0; drawWheel(); clearResult();
        }

        function resetTool() {
            if (isSpinning) { cancelAnimationFrame(animationId); isSpinning = false; spinButton.disabled = false; resetButton.disabled = false; }
            updateSeedInputAndState(currentSeed || generateTrulyRandomSeed());
            document.getElementById('modeColors').checked = true;
            colorCountInput.value = 5;
            customItemsTextarea.value = '';
            switchMode();
        }

        function clearResult() {
            pickedItemSpan.textContent = ''; pickedColorCodeSpan.textContent = ''; pickedColorBlockDiv.style.display = 'none';
        }

        window.onload = () => {
            const s = localStorage.getItem(SEED_STORAGE_KEY);
            updateSeedInputAndState(s ? (isNaN(parseFloat(s)) ? s : parseFloat(s)) : generateTrulyRandomSeed());
            switchMode();
        };
    </script>
</body>
</html>
