<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>轉盤抽籤器</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #FDFBF7; color: #4A4036; }
        .container { background: #E8E4D9; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; }
        #canvas { margin-top: 20px; cursor: pointer; border-radius: 50%; border: 5px solid #C4B5A5; }
        button { background: #C4B5A5; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>轉盤抽籤器</h1>
        <select id="mode-select" onchange="updateItems()">
            <option value="common">常見顏色</option>
            <option value="pastels">柔和色系</option>
            <option value="bright">鮮豔色系</option>
        </select>
        <br>
        <canvas id="canvas" width="300" height="300"></canvas>
        <br>
        <button onclick="spin()">轉動！</button>
        <h2 id="result"></h2>
    </div>
    <script>
        const data = {
            common: ["#FF0000", "#0000FF", "#008000", "#FFFF00", "#800080", "#FFA500", "#FFC0CB", "#A52A2A"],
            pastels: ["#ADD8E6", "#90EE90", "#FFB6C1", "#E6E6FA", "#F5F5DC", "#98FF98"],
            bright: ["#FF0000", "#4169E1", "#50C878", "#FFFF00", "#C71585", "#FF4500"]
        };
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let currentItems = data.common;
        let rotation = 0;

        function drawWheel() {
            const slice = 2 * Math.PI / currentItems.length;
            ctx.clearRect(0, 0, 300, 300);
            currentItems.forEach((color, i) => {
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 140, i * slice + rotation, (i + 1) * slice + rotation);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.stroke();
            });
        }

        function updateItems() {
            currentItems = data[document.getElementById('mode-select').value];
            drawWheel();
        }

        function spin() {
            const spinAngle = Math.random() * 2 * Math.PI + 10 * Math.PI;
            rotation += spinAngle;
            drawWheel();
            document.getElementById('result').textContent = "抽到顏色！";
        }
        drawWheel();
    </script>
</body>
</html>
